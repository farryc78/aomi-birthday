<!DOCTYPE html>

<head>

<body class="index-body">
  <div class="page-transition-overlay" id="pageTransitionOverlay" aria-hidden="true">

      <p class="subtitle">Ada kejutan buat kamu sayangg</p>

        <div class="countdown-item"><span class="num" id="hours">00</span><span class="lbl">Jam</span></div>
        <div class="countdown-item"><span class="num" id="minutes">00</span><span class="lbl">Menit</span></div>
        <div class="countdown-item"><span class="num" id="seconds">00</span><span class="lbl">Detik</span></div>
      </div>

      <p class="countdown-hint" id="countdownHint">Sabar yaa, hadiahnya belum boleh dibuka...</p>

      <button class="gift-button" id="giftButton" disabled>Buka Hadiah Kamu</button>
